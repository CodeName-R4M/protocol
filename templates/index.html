<!DOCTYPE html>
<html>
<head>
    <title>Stark Industries - Secure Access</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ffd700; 
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(15, 52, 96, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ffd700;
        }
        .login-form {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ffd700;
            background: #1a1a2e;
            color: #ffd700;
            border-radius: 5px;
            font-size: 16px;
            width: 200px;
        }
        button:hover {
            background: #ffd700;
            color: #1a1a2e;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Stark Industries - Secure Access</h1>
        <p>Authentication Required</p>
        
        <div class="login-form">
            <h3>System Login</h3>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
