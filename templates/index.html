<!DOCTYPE html>
<html>
<head>
    <title>House Party Protocol - Prototype</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🛡️ House Party Protocol</h1>
        <p>Prototype Control Interface</p>
        
        <div class="armor">
            <h3>Mark I - VIII</h3>
            <button onclick="activateArmor('I-VIII')">Activate</button>
            <span>Access: Granted</span>
        </div>
        
        <div class="armor disabled">
            <h3>Mark IX - XLII</h3>
            <button disabled onclick="activateArmor('IX-XLII')">Activate</button>
            <span>Access: Restricted</span>
        </div>
        
        <div class="armor disabled">
            <h3>Mark XLIII - LXXXV (Full Protocol)</h3>
            <button disabled onclick="activateArmor('FULL')">Activate</button>
            <span>Access: Tony Stark Authorization Required</span>
        </div>
        
        <div id="result" style="margin-top: 20px; padding: 15px; background: #1a2a3a; border-radius: 5px; display: none;"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
