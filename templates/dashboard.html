<!DOCTYPE html>
<html>
<head>
    <title>Access Granted</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ffd700; 
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 52, 96, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ffd700;
        }
        .access-granted {
            background: #0f3460;
            padding: 40px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        .secret-revealed {
            background: #1a3a5f;
            padding: 25px;
            border-radius: 8px;
            margin: 25px 0;
            text-align: center;
            border: 1px solid #44ff44;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="access-granted">
            <h1>✅ ACCESS GRANTED</h1>
            <p>Authentication Successful</p>
        </div>

        <div class="secret-revealed">
            <h2>🔓 SECRET REVEALED</h2>
            <p>The other secret is now accessible</p>
        </div>

        <div style="background: #000; padding: 15px; border-radius: 5px; margin-top: 20px; text-align: center;">
            <p>> System Ready</p>
            <p>All protocols activated</p>
        </div>
    </div>
</body>
</html>
